name: xrayearth
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - cudatoolkit=11.8
  - pip

  - pip:
    - torch==2.1.2 --index-url https://download.pytorch.org/whl/cu118
    - torchvision==0.16.2 --index-url https://download.pytorch.org/whl/cu118
    - opencv-python==4.9.0.80
    - Pillow==10.2.0
    - albumentations==1.4.0
    - pycocotools==2.0.7
    - shapely==2.0.3
    - numpy==1.26.4
    - pandas==2.2.1
    - tqdm==4.66.2
    - PyYAML==6.0.1
    - omegaconf==2.3.0
    - wandb==0.16.6
    - scikit-learn==1.4.1
    - torchmetrics==1.3.1
    - onnx==1.15.0
    - onnxruntime-gpu==1.17.1
    - matplotlib==3.8.3
    - seaborn==0.13.2
    - rich==13.7.1
    - python-dotenv==1.0.1
